<svg viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Caliber — strength, measured">
  <defs>
    <radialGradient id="bg" cx="50%" cy="-6%" r="90%">
      <stop offset="0%" stop-color="#1c2028"/>
      <stop offset="55%" stop-color="#14161A"/>
      <stop offset="100%" stop-color="#101216"/>
    </radialGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c6222" stop-opacity="0"/>
      <stop offset="100%" stop-color="#7c6222" stop-opacity=".55"/>
    </linearGradient>
    <style>
      .mono{font-family:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace}
      .sans{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    </style>
  </defs>

  <rect width="1200" height="440" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="439" fill="none" stroke="#2C313B" stroke-width="1"/>

  <!-- wordmark -->
  <text x="600" y="168" text-anchor="middle" class="mono" font-size="104" font-weight="600"
        fill="#E7EAF0" letter-spacing="26">CALIBER<tspan fill="#E8B23A">.</tspan></text>
  <text x="600" y="212" text-anchor="middle" class="sans" font-size="21"
        fill="#59616F" letter-spacing="13">STRENGTH, MEASURED</text>

  <!-- gauge: scale 150..1050, percentile 0..100 -->
  <g transform="translate(0,318)">
    <!-- track + fill up to the 'you' needle (57th) -->
    <line x1="150" y1="0" x2="1050" y2="0" stroke="#373D48" stroke-width="3" stroke-linecap="round"/>
    <line x1="150" y1="0" x2="663" y2="0" stroke="url(#fill)" stroke-width="3" stroke-linecap="round"/>

    <!-- ticks 5 / 25 / 50 / 75 / 95 -->
    <g stroke="#373D48" stroke-width="1.5">
      <line x1="195"  y1="-7" x2="195"  y2="7"/>
      <line x1="375"  y1="-7" x2="375"  y2="7"/>
      <line x1="600"  y1="-7" x2="600"  y2="7"/>
      <line x1="825"  y1="-7" x2="825"  y2="7"/>
      <line x1="1005" y1="-7" x2="1005" y2="7"/>
    </g>
    <g class="mono" font-size="15" fill="#59616F" text-anchor="middle">
      <text x="195"  y="30">5</text>
      <text x="375"  y="30">25</text>
      <text x="600"  y="30">50</text>
      <text x="825"  y="30">75</text>
      <text x="1005" y="30">95</text>
    </g>

    <!-- AIM notch at 70th -->
    <g>
      <line x1="780" y1="-16" x2="780" y2="12" stroke="#8A93A3" stroke-width="1.5" stroke-dasharray="3 3"/>
      <text x="780" y="-24" text-anchor="middle" class="mono" font-size="13" fill="#8A93A3">AIM · 70th</text>
    </g>

    <!-- YOU needle at 57th -->
    <g transform="translate(663,0)">
      <line x1="0" y1="-13" x2="0" y2="13" stroke="#E8B23A" stroke-width="2.5"/>
      <path d="M0,-15 l8,-11 l-16,0 z" fill="#E8B23A"/>
      <text x="0" y="-34" text-anchor="middle" class="mono" font-size="18" font-weight="600" fill="#E8B23A">57th</text>
    </g>
    <text x="150" y="-30" class="mono" font-size="13" fill="#59616F" letter-spacing="4">YOU</text>
  </g>
</svg>
